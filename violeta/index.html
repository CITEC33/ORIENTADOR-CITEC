            "@type": "FAQPage",
            "@id": "https://fuerzavioleta.mx/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "¿Qué es Fuerza Violeta?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Es una plataforma de orientación y apoyo para mujeres. Incluye botón SOS, contactos de ayuda, violentómetro con test, alertas, artículos, eventos y un chatbot con IA para resolver dudas."
                }
              },
              {
                "@type": "Question",
                "name": "¿Cómo funciona el botón SOS?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "El botón SOS busca ayudarte a actuar rápido mostrando opciones de contacto y pasos de seguridad. Si estás en peligro inmediato, contacta a las autoridades locales de emergencia."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué es el violentómetro?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Es una herramienta para identificar señales y niveles de violencia. Incluye un test orientativo para reconocer situaciones de riesgo."
                }
              },
              {
                "@type": "Question",
                "name": "¿El chatbot con IA sustituye a profesionales o autoridades?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. El chatbot ofrece orientación general y puede ayudarte a encontrar recursos, pero no reemplaza atención profesional ni servicios de emergencia."
                }
              }
            ]
          }
